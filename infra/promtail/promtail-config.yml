server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: vibe-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 컨테이너명을 service 라벨로 (vibe-* 접두 제거)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/vibe-(.*)"
        target_label: "service"
        replacement: "$1"
      # 모든 로그를 vibe-framework job 라벨로 통일
      - source_labels: ["__meta_docker_container_name"]
        target_label: "job"
        replacement: "vibe-framework"
    pipeline_stages:
      # JSON 파싱 (structlog 출력)
      - json:
          expressions:
            level: level
            job_id: job_id
            event: event
            service_name: service
      # 추출한 필드를 라벨로 (Grafana 검색용)
      - labels:
          level:
          job_id:
          event:
