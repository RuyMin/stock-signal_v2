auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  path_prefix: /loki                  # WAL/chunks/rules 모두 /loki 하위 (컨테이너 user 쓰기 가능)
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb                     # boltdb-shipper(deprecated) → tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h              # 7일 보관
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: false
