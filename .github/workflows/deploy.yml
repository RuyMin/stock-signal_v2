name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # 수동 트리거 (deploy만 따로 돌리고 싶을 때)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ruymin/stock-signal_v2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - { name: backend,                  context: ./backend }
          - { name: crewai,                   context: ./crewai }
          - { name: scheduler,                context: ./scheduler }
          - { name: worker-data-collector,    context: ./workers/data_collector }
          - { name: worker-telegram-notifier, context: ./workers/telegram_notifier }
          - { name: worker-telegram-listener, context: ./workers/telegram_listener }

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM 크로스 빌드)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ruymin
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if Dockerfile not present
        id: dockerfile-check
        run: |
          if [ -f "${{ matrix.context }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Dockerfile not found at ${{ matrix.context }} — skip build"
          fi

      - name: Build and push (linux/arm64)
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/stock-signal
            git pull origin main

            echo ${{ secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ruymin --password-stdin

            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --env-file .env.prod pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --env-file .env.prod up -d --remove-orphans

            sleep 10
            curl -fsS http://localhost:8000/health || (echo "Health check failed" && exit 1)

            docker image prune -f
            echo "Deploy complete: ${{ github.sha }}"
