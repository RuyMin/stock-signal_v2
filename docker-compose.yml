# stock-signal — Docker Compose 베이스
# 환경별 오버라이드: docker-compose.dev.yml / .staging.yml / .prod.yml
# 사용: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.9'

networks:
  vibe-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  loki-data:
  grafana-data:
  # KIS OAuth 토큰 공유 캐시 — backend/crewai/worker-data-collector가 같이 read/write.
  # 1분 내 재발급 차단 정책 회피. 컨테이너 재시작 후 재사용.
  kis-token-cache:

services:

  # ─── 인프라 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vibe-postgres
    networks: [vibe-net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: vibe-zookeeper
    networks: [vibe-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - kafka-data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vibe-kafka
    networks: [vibe-net]
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── 로그 스택 ─────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: vibe-loki
    networks: [vibe-net]
    volumes:
      - loki-data:/loki
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: vibe-promtail
    networks: [vibe-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki: {condition: service_healthy}

  grafana:
    image: grafana/grafana:10.4.0
    container_name: vibe-grafana
    networks: [vibe-net]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      loki: {condition: service_healthy}

  # ─── 애플리케이션 ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibe-backend
    networks: [vibe-net]
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # KIS API — POST /holdings에서 종목명 즉시 조회용. 키 미설정 시 worker-data-collector 폴백.
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_BASE_URL=${KIS_BASE_URL:-}
      - KIS_TR_SEARCH_STOCK_INFO=${KIS_TR_SEARCH_STOCK_INFO:-CTPF1002R}
    volumes:
      - ./shared/schemas:/app/schemas:ro
      - kis-token-cache:/var/cache/kis
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  crewai:
    build:
      context: ./crewai
      dockerfile: Dockerfile
    container_name: vibe-crewai
    networks: [vibe-net]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME}
      # KIS API — on_complete()에서 recommendations.name 즉시 채우기용. 키 미설정 시 NULL fallback.
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_BASE_URL=${KIS_BASE_URL:-}
      - KIS_TR_SEARCH_STOCK_INFO=${KIS_TR_SEARCH_STOCK_INFO:-CTPF1002R}
    volumes:
      - ./shared/schemas:/app/schemas:ro
      - kis-token-cache:/var/cache/kis

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: vibe-scheduler
    networks: [vibe-net]
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      # 2-cron: intraday + premarket (코드 default: 16:30 / 06:30 KST). env 비워두면 default 사용.
      - SCHEDULE_INTRADAY_HOUR=${SCHEDULE_INTRADAY_HOUR:-}
      - SCHEDULE_INTRADAY_MINUTE=${SCHEDULE_INTRADAY_MINUTE:-}
      - SCHEDULE_PREMARKET_HOUR=${SCHEDULE_PREMARKET_HOUR:-}
      - SCHEDULE_PREMARKET_MINUTE=${SCHEDULE_PREMARKET_MINUTE:-}
    volumes:
      - ./shared/schemas:/app/schemas:ro

  worker-data-collector:
    build:
      context: ./workers/data_collector
      dockerfile: Dockerfile
    container_name: vibe-worker-data-collector
    networks: [vibe-net]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_GROUP_ID=data-collector
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_BASE_URL=${KIS_BASE_URL}
      - KIS_SIGNAL_MARKET_SCOPE=${KIS_SIGNAL_MARKET_SCOPE:-0000}
      - KIS_TR_FOREIGN_INSTITUTION_TOTAL=${KIS_TR_FOREIGN_INSTITUTION_TOTAL:-FHPTJ04400000}
      - KIS_TR_SEARCH_STOCK_INFO=${KIS_TR_SEARCH_STOCK_INFO:-CTPF1002R}
    volumes:
      - ./shared/schemas:/app/schemas:ro
      - kis-token-cache:/var/cache/kis

  worker-telegram-notifier:
    build:
      context: ./workers/telegram_notifier
      dockerfile: Dockerfile
    container_name: vibe-worker-telegram-notifier
    networks: [vibe-net]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_GROUP_ID=telegram-notifier
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_AUTHORIZED_CHAT_ID=${TELEGRAM_AUTHORIZED_CHAT_ID}
    volumes:
      - ./shared/schemas:/app/schemas:ro

  worker-telegram-listener:
    build:
      context: ./workers/telegram_listener
      dockerfile: Dockerfile
    container_name: vibe-worker-telegram-listener
    networks: [vibe-net]
    depends_on:
      backend: {condition: service_healthy}
    environment:
      - VIBE_ENV=${VIBE_ENV}
      - TZ=${TZ}
      - BACKEND_URL=http://backend:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_AUTHORIZED_CHAT_ID=${TELEGRAM_AUTHORIZED_CHAT_ID}
    volumes:
      - ./shared/schemas:/app/schemas:ro
