        pip install -q --no-cache-dir pytest pytest-asyncio asyncpg respx freezegun \
        && python -m pytest tests/unit/crewai -v --tb=short --strict-markers

networks:
  vibe-net:
    name: stock-signal_vibe-net
    external: true
