      context: ./workers/telegram_notifier
      dockerfile: Dockerfile
    image: stock-signal-telegram-notifier:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - VIBE_ENV=dev
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-stock}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-codedream}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stock}:${POSTGRES_PASSWORD:-codedream}@postgres:5432/stock_signal_test
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TELEGRAM_BOT_TOKEN=test
      - TELEGRAM_AUTHORIZED_CHAT_ID=12345
      - PYTHONPATH=/app:/app/schemas:/repo
    volumes:
      - ./workers/telegram_notifier:/app
      - ./shared/schemas:/app/schemas:ro
      - ./tests:/repo/tests:ro
      - ./infra/postgres/init.sql:/repo/infra/postgres/init.sql:ro
    networks:
      - vibe-net
    working_dir: /repo
    entrypoint:
      - /bin/sh
      - -c
      - |
        pip install -q --no-cache-dir pytest pytest-asyncio asyncpg respx freezegun \
        && python -m pytest tests/unit/workers/test_telegram_notifier.py -v --tb=short --strict-markers

  telegram-listener-tests:
    build:
      context: ./workers/telegram_listener
      dockerfile: Dockerfile
    image: stock-signal-telegram-listener:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - VIBE_ENV=dev
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-stock}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-codedream}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stock}:${POSTGRES_PASSWORD:-codedream}@postgres:5432/stock_signal_test
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TELEGRAM_BOT_TOKEN=test
      - TELEGRAM_AUTHORIZED_CHAT_ID=12345
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/app:/app/schemas:/repo
    volumes:
      - ./workers/telegram_listener:/app
