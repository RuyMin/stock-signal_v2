      - ./tests:/repo/tests:ro
      - ./infra/postgres/init.sql:/repo/infra/postgres/init.sql:ro
    networks:
      - vibe-net
    working_dir: /repo
    entrypoint:
      - /bin/sh
      - -c
      - |
        pip install -q --no-cache-dir pytest pytest-asyncio asyncpg respx freezegun \
        && python -m pytest tests/unit/workers/test_telegram_listener.py -v --tb=short --strict-markers

  scheduler-tests:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    image: stock-signal-scheduler:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - VIBE_ENV=dev
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-stock}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-codedream}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stock}:${POSTGRES_PASSWORD:-codedream}@postgres:5432/stock_signal_test
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONPATH=/app:/app/schemas:/repo
    networks:
      - vibe-net
    volumes:
      - ./scheduler:/app
      - ./shared/schemas:/app/schemas:ro
      - ./tests:/repo/tests:ro
      - ./infra/postgres/init.sql:/repo/infra/postgres/init.sql:ro
    working_dir: /repo
    entrypoint:
      - /bin/sh
      - -c
      - |
        pip install -q --no-cache-dir pytest pytest-asyncio asyncpg freezegun \
        && python -m pytest tests/unit/workers/test_scheduler_holiday.py -v --tb=short --strict-markers

  crewai-tests:
    build:
      context: ./crewai
      dockerfile: Dockerfile
    image: stock-signal-crewai:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - VIBE_ENV=dev
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-stock}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-codedream}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stock}:${POSTGRES_PASSWORD:-codedream}@postgres:5432/stock_signal_test
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OPENAI_API_KEY=test-key
      - OPENAI_MODEL_NAME=gpt-4o-mini
      - PYTHONPATH=/app:/app/schemas:/repo
    volumes:
      - ./crewai:/app
      - ./shared/schemas:/app/schemas:ro
      - ./tests:/repo/tests:ro
      - ./infra/postgres/init.sql:/repo/infra/postgres/init.sql:ro
    networks:
      - vibe-net
    working_dir: /repo
    entrypoint:
